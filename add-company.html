<!DOCTYPE html>
<html>
<head>
<title>Add Company</title>
<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="form-box">

<h2>Add Company</h2>

<input id="companyName" placeholder="Company Name">

<input id="role" placeholder="Job Role">

<input id="package" placeholder="Package (LPA)">

<input id="branch" placeholder="Eligible Branch (IT/CSE/CE)">

<input id="cgpa" placeholder="Minimum CGPA">

<textarea id="rules" placeholder="Company Rules"></textarea>

<button onclick="addCompany()">Add Company</button>

</div>

<script src="js/admin.js"></script>
<input id="logo" placeholder="Company Logo URL">
<img src="${company.logo}" width="100">
</body>
</html>
